<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ScreenSight AI</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    button { padding: 0.6rem 1rem; border: 1px solid #aaa; border-radius: 8px; cursor: pointer; }
    input { width: 6rem; }
    video { width: 100%; max-height: 340px; background: #111; border-radius: 8px; }
    pre { background: #111; color: #adffb4; padding: 1rem; border-radius: 8px; overflow: auto; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>ScreenSight AI (Codespaces, no mss)</h1>
  <p class="muted">Choose a tab/window/screen, stream frames, and receive live analysis.</p>

  <div class="row">
    <button id="startBtn">Start sharing</button>
    <button id="stopBtn" disabled>Stop</button>
    <label>FPS <input id="fps" type="number" min="1" max="12" value="3" /></label>
    <label>JPEG quality <input id="quality" type="number" min="0.1" max="1" step="0.1" value="0.6" /></label>
    <label><input id="ocr" type="checkbox" /> OCR</label>
  </div>

  <video id="preview" autoplay muted playsinline></video>
  <h3>Latest AI response</h3>
  <pre id="output">Waiting…</pre>

  <script>
    const preview = document.getElementById('preview');
    const output = document.getElementById('output');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const fpsInput = document.getElementById('fps');
    const qualityInput = document.getElementById('quality');
    const ocrInput = document.getElementById('ocr');

    let stream = null;
    let ws = null;
    let timer = null;

    function wsUrl() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      return `${proto}://${location.host}/ws`;
    }

    async function frameToBase64(video, quality) {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
      const buf = await blob.arrayBuffer();
      let binary = '';
      const bytes = new Uint8Array(buf);
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    async function start() {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: Number(fpsInput.value) || 3 } },
        audio: false,
      });
      preview.srcObject = stream;

      ws = new WebSocket(wsUrl());
      ws.onmessage = (evt) => {
        output.textContent = evt.data;
      };

      await new Promise(resolve => ws.onopen = resolve);

      const fps = Math.max(1, Number(fpsInput.value) || 3);
      const quality = Math.min(1, Math.max(0.1, Number(qualityInput.value) || 0.6));
      const intervalMs = Math.round(1000 / fps);

      timer = setInterval(async () => {
        if (!preview.videoWidth || ws.readyState !== WebSocket.OPEN) return;
        const jpegBase64 = await frameToBase64(preview, quality);
        ws.send(JSON.stringify({
          type: 'frame',
          jpeg_base64: jpegBase64,
          enable_ocr: !!ocrInput.checked,
        }));
      }, intervalMs);

      startBtn.disabled = true;
      stopBtn.disabled = false;
    }

    function stop() {
      if (timer) clearInterval(timer);
      timer = null;
      if (ws) ws.close();
      ws = null;
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      stream = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }

    startBtn.addEventListener('click', () => start().catch(err => output.textContent = String(err)));
    stopBtn.addEventListener('click', stop);
  </script>
</body>
</html>
